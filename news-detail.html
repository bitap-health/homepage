<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ詳細 | 株式会社BitaP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav>
      <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit;">株式会社BitaP</a></div>
      <ul class="nav-links">
        <li><a href="index.html">トップ</a></li>
        <li><a href="index.html#jisseki">実績</a></li>
        <li><a href="index.html#sns">公式SNS</a></li>
        <li><a href="index.html#yurai">社名の由来</a></li>
        <li><a href="index.html#gaiyou">会社概要</a></li>
        <li><a href="news.html">お知らせ</a></li>
        <li><a href="privacy.html">プライバシーポリシー</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="page-header">
      <div class="container">
        <p><a href="news.html">← お知らせ一覧に戻る</a></p>
      </div>
    </section>

    <section class="section">
      <div class="container detail-content">
        <div id="detail-body">読み込み中...</div>
      </div>
    </section>

  </main>

  <footer>
    <div class="container">
      <p class="footer-copy">© 2025 株式会社BitaP</p>
      <p><a href="news.html">お知らせ</a> | <a href="privacy.html">プライバシーポリシー</a></p>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'), 10);

    fetch('news.json')
      .then(res => res.json())
      .then(data => {
        const item = data[id];
        if (!item) {
          document.getElementById('detail-body').innerHTML = '<p>記事が見つかりませんでした。</p>';
          return;
        }

        document.title = item.title + ' | 株式会社BitaP';

        const imgHTML = item.image
          ? `<img class="detail-img" src="${item.image}" alt="${item.title}">`
          : '';

        document.getElementById('detail-body').innerHTML = `
          <p class="detail-date">${item.date}</p>
          <h1 class="detail-title">${item.title}</h1>
          ${imgHTML}
          <div class="detail-text">${item.body}</div>
        `;
      })
      .catch(() => {
        document.getElementById('detail-body').innerHTML = '<p>読み込みに失敗しました。</p>';
      });
  </script>

</body>
</html>
